PROFILE_DESCRIPTION="Lab/Sandbox — sem restrições, ambiente descartável"

# sqlmap
SQLMAP_LEVEL=5
SQLMAP_RISK=3
SQLMAP_THREADS=10
SQLMAP_DUMP=true
SQLMAP_MAX_URLS=500
SQLMAP_TIMEOUT_URL=600

# Metasploit
MSF_ENABLED=true
MSF_PAYLOAD="generic/shell_reverse_tcp"
MSF_TIMEOUT=3600

# Brute force (Hydra)
BRUTE_ENABLED=true
BRUTE_TIMEOUT=600
BRUTE_TASKS=16

# Nikto
NIKTO_ENABLED=true
NIKTO_TIMEOUT=1200
NIKTO_MIN_SEVERITY=1   # 1=info, 2=medium, 3=high

# Limites gerais
MAX_EXPLOITS=999
